name: Deploy guide to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out guide
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Configure optional cloud sync endpoint
        env:
          RADICAL_RED_SYNC_ENDPOINT: ${{ vars.RADICAL_RED_SYNC_ENDPOINT }}
        run: |
          node -e "require('fs').writeFileSync('sync-config.js', 'window.RADICAL_RED_SYNC_ENDPOINT = ' + JSON.stringify(process.env.RADICAL_RED_SYNC_ENDPOINT || '') + ';\n')"
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
