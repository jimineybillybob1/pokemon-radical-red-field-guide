  <div class="shell">
    <aside class="sidebar">
      <nav>
        <button class="active" data-view="home"><img class="nav-sprite" src="assets/items/exp-candy-xl.png" alt="">Overview</button>
        <button data-view="pokedex"><img class="nav-sprite" src="assets/items/poke-radar.png" alt="">Pokédex</button>

        <button data-view="save"><img class="nav-sprite" src="assets/items/card-key.png" alt="">Save &amp; Sync</button>
      </nav>

    <main id="mainContent" tabindex="-1"></main>
